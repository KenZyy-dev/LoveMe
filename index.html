<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You ❤️</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }

      #confettiCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      .proposal-box,
      .success-screen {
        background: rgba(255, 255, 255, 0.9);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        z-index: 5;
        max-width: 400px;
        width: 90%;
        transition: transform 0.3s ease;
      }

      .success-screen {
        display: none;
      }

      h1,
      h2 {
        color: #ff4d6d;
        margin-bottom: 20px;
      }

      .btn-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
        position: relative;
        height: 50px;
      }

      button {
        padding: 12px 25px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      #yesBtn {
        background-color: #ff4d6d;
        color: white;
      }

      #yesBtn:hover {
        background-color: #ff758f;
        transform: scale(1.1);
      }

      #noBtn {
        background-color: #6c757d;
        color: white;
        position: absolute;
      }

      .photo-grid {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .love-photo {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 10px;
        border: 3px solid #ffb3c1;
      }

      .bg-heart {
        position: absolute;
        bottom: -50px;
        font-size: 24px;
        animation: floatUp 6s linear infinite;
        opacity: 0.7;
        z-index: 1;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-105vh) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="confettiCanvas"></canvas>

    <div class="bg-heart" style="left: 10%; animation-delay: 0s">❤️</div>
    <div class="bg-heart" style="left: 30%; animation-delay: 2s">💖</div>
    <div class="bg-heart" style="left: 75%; animation-delay: 1s">💕</div>
    <div class="bg-heart" style="left: 90%; animation-delay: 4s">❤️</div>

    <div class="proposal-box" id="proposalBox">
      <h1>Do you love me? 🥺</h1>
      <div class="btn-container">
        <button id="yesBtn">Yes</button>
        <button id="noBtn" style="left: 55%">No</button>
      </div>
    </div>

    <div class="success-screen" id="successScreen">
      <h2>I knew it! Hehe ❤️</h2>
      <div class="photo-grid">
        <img class="love-photo" src="Love/pic/1.jpg" alt="Photo 1" />
        <img class="love-photo" src="Love/pic/2.jpg" alt="Photo 2" />
        <img class="love-photo" src="Love/pic/3.jpg" alt="Photo 3" />
      </div>
    </div>

    <script>
      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");
      const proposalBox = document.getElementById("proposalBox");
      const successScreen = document.getElementById("successScreen");
      const canvas = document.getElementById("confettiCanvas");
      const ctx = canvas.getContext("2d");

      let confetti = [];

      function moveNoButton() {
        const maxX = window.innerWidth - noBtn.offsetWidth - 40;
        const maxY = window.innerHeight - noBtn.offsetHeight - 40;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.position = "fixed";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
      }

      noBtn.addEventListener("mouseenter", moveNoButton);
      noBtn.addEventListener("click", moveNoButton);

      yesBtn.addEventListener("click", () => {
        proposalBox.style.display = "none";
        successScreen.style.display = "block";
        setupCanvas();
        startConfetti();
      });

      function setupCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function startConfetti() {
        for (let i = 0; i < 100; i++) {
          confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 4,
            d: Math.random() * canvas.height,
            color: `rgba(${Math.floor(Math.random() * 255)}, ${Math.floor(Math.random() * 100 + 155)}, ${Math.floor(Math.random() * 150 + 105)}, 1)`,
            tilt: Math.random() * 10 - 5,
          });
        }
        updateConfetti();
      }

      function updateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confetti.forEach((p, index) => {
          p.y += Math.cos(p.d) + 1 + p.r / 2;
          p.tilt += 0.1;
          ctx.beginPath();
          ctx.lineWidth = p.r;
          ctx.strokeStyle = p.color;
          ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
          ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
          ctx.stroke();

          if (p.y > canvas.height) {
            confetti[index] = {
              x: Math.random() * canvas.width,
              y: -20,
              r: p.r,
              d: p.d,
              color: p.color,
              tilt: p.tilt,
            };
          }
        });
        requestAnimationFrame(updateConfetti);
      }

      window.addEventListener("resize", setupCanvas);
    </script>
  </body>
</html>
